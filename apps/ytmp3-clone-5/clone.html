<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>GetTube - Minimalist Downloader</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">

    <style>
        /* --- RESET & VARIABLES --- */
        :root {
            --font-body: 'Inter', sans-serif;
            --font-logo: 'Outfit', sans-serif;
            --color-bg: #ffffff;
            --color-text: #1f2937;
            --color-gray-border: #dfe1e5;
            --color-shadow: rgba(32, 33, 36, 0.28);
            --color-blue-50: #eff6ff;
            --color-blue-600: #2563eb;
            --color-blue-700: #1d4ed8;
            --color-gray-100: #f3f4f6;
            --color-gray-400: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        button {
            border: none;
            background: none;
            cursor: pointer;
            font-family: inherit;
        }

        /* --- HEADER & FOOTER --- */
        header {
            position: absolute;
            top: 0;
            right: 0;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            font-size: 14px;
            font-weight: 500;
            color: #4b5563;
            z-index: 10;
        }

        header a {
            text-decoration: none;
            color: inherit;
        }

        header a:hover {
            color: #000;
            text-decoration: underline;
        }

        .menu-icon-btn {
            padding: 8px;
            border-radius: 50%;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-icon-btn:hover {
            background-color: var(--color-gray-100);
        }

        footer {
            position: fixed;
            bottom: 24px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: #d1d5db;
            pointer-events: none;
        }

        /* --- MAIN LAYOUT --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
            width: 100%;
        }

        /* --- LOGO --- */
        .logo {
            margin-bottom: 40px;
            font-family: var(--font-logo);
            font-size: 84px; /* Significantly increased size */
            font-weight: 700; /* Bolder font weight */
            letter-spacing: -0.04em;
            user-select: none;
        }

        @media (max-width: 768px) {
            .logo { font-size: 56px; }
        }

        .logo span:nth-child(1) { color: #4285F4; } /* G */
        .logo span:nth-child(2) { color: #EA4335; } /* e */
        .logo span:nth-child(3) { color: #FBBC05; } /* t */
        .logo span:nth-child(4) { color: #4285F4; } /* T */
        .logo span:nth-child(5) { color: #34A853; } /* u */
        .logo span:nth-child(6) { color: #EA4335; } /* b */
        .logo span:nth-child(7) { color: #5f6368; } /* e */

        /* --- SEARCH COMPONENT WRAPPER --- */
        .search-wrapper {
            position: relative;
            width: 100%;
            max-width: 672px; /* Equivalent to max-w-2xl */
        }

        /* --- SEARCH BAR (The Pill) --- */
        .search-bar {
            display: flex;
            align-items: center;
            width: 100%;
            height: 52px; /* Slightly taller for better proportions with large logo */
            background: #fff;
            border-radius: 26px;
            /* Permanent Shadow */
            box-shadow: 0 1px 6px 0 var(--color-shadow); 
            transition: all 0.2s ease;
        }

        /* --- LEFT: FORMAT SELECTOR --- */
        .format-container {
            position: relative;
            padding-left: 6px;
        }

        .format-btn {
            height: 40px;
            padding: 0 16px;
            background-color: var(--color-blue-50);
            color: var(--color-blue-700);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background-color 0.2s;
        }

        .format-btn:hover {
            background-color: #dbeafe; /* lighter blue hover */
        }

        .chevron {
            opacity: 0.6;
            transition: transform 0.2s;
        }

        .chevron.rotate {
            transform: rotate(180deg);
        }

        /* --- CENTER: INPUT --- */
        .search-input {
            flex: 1;
            height: 100%;
            border: none;
            outline: none;
            padding-left: 16px;
            font-size: 16px;
            color: #1f2937;
            background: transparent;
        }

        .search-input::placeholder {
            color: #9ca3af;
        }

        /* --- RIGHT: ACTIONS --- */
        .actions-container {
            display: flex;
            align-items: center;
            padding-right: 6px;
            gap: 4px;
        }

        /* Settings Button */
        .settings-container {
            position: relative;
        }

        .settings-btn {
            padding: 10px;
            border-radius: 50%;
            color: #9ca3af;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .settings-btn:hover, .settings-btn.active {
            background-color: var(--color-gray-100);
            color: #4b5563;
        }

        /* Divider */
        .divider {
            width: 1px;
            height: 24px;
            background-color: #e5e7eb;
            margin: 0 4px;
        }

        /* Download Button (Solid) */
        .download-btn {
            width: 40px; /* Match format btn height for visual balance */
            height: 40px;
            background-color: var(--color-blue-600);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: all 0.2s;
        }

        .download-btn:hover {
            background-color: #1d4ed8;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            transform: scale(1.05);
        }

        .download-btn:active {
            transform: scale(0.95);
        }

        /* --- DROPDOWNS --- */
        .dropdown {
            position: absolute;
            top: 54px; /* Just below the input */
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border: 1px solid #f3f4f6;
            padding: 8px 0;
            z-index: 20;
            display: none; /* Hidden by default */
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.2s, transform 0.2s;
        }

        .dropdown.show {
            display: block;
            /* Allow display:block to take effect before animating opacity */
            animation: fadeIn 0.2s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dropdown-left { left: 0; width: 160px; }
        .dropdown-right { right: 0; width: 240px; }

        .dropdown-header {
            padding: 8px 16px;
            font-size: 10px;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .dropdown-item {
            width: 100%;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: #374151;
            transition: background 0.15s;
        }

        .dropdown-item:hover {
            background-color: #f9fafb;
        }

        .dropdown-item svg.check-icon {
            opacity: 0;
            color: var(--color-blue-600);
        }

        .dropdown-item.selected svg.check-icon {
            opacity: 1;
        }

        .dropdown-divider {
            height: 1px;
            background-color: #f3f4f6;
            margin: 8px 16px;
        }

        .dropdown-footer {
            padding: 8px 16px;
            font-size: 12px;
            color: #9ca3af;
        }

        .dropdown-footer span {
            font-weight: 500;
            color: #4b5563;
        }

    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
  }
}
</script>
</head>
<body>

    <!-- Header -->
    <header>
        <a href="#">Tools</a>
        <a href="#">FAQ</a>
        <div class="menu-icon-btn">
            <!-- Menu Icon -->
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="4" y1="12" x2="20" y2="12"></line>
                <line x1="4" y1="6" x2="20" y2="6"></line>
                <line x1="4" y1="18" x2="20" y2="18"></line>
            </svg>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Logo -->
        <h1 class="logo">
            <span>G</span><span>e</span><span>t</span><span>T</span><span>u</span><span>b</span><span>e</span>
        </h1>

        <!-- Search Component -->
        <div class="search-wrapper">
            <div class="search-bar">
                
                <!-- Format Selector -->
                <div class="format-container">
                    <button class="format-btn" id="formatBtn">
                        <span id="currentFormat">MP4</span>
                        <!-- Chevron Icon -->
                        <svg class="chevron" id="formatChevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m6 9 6 6 6-6"/>
                        </svg>
                    </button>

                    <!-- Format Dropdown -->
                    <div class="dropdown dropdown-left" id="formatDropdown">
                        <div class="dropdown-header">Select Format</div>
                        <button class="dropdown-item selected" onclick="selectFormat('MP4')">
                            <span>MP4 Video</span>
                            <svg class="check-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        </button>
                        <button class="dropdown-item" onclick="selectFormat('MP3')">
                            <span>MP3 Audio</span>
                            <svg class="check-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        </button>
                    </div>
                </div>

                <!-- Input -->
                <input type="text" class="search-input" placeholder="Paste YouTube link">

                <!-- Right Actions -->
                <div class="actions-container">
                    
                    <!-- Settings -->
                    <div class="settings-container">
                        <button class="settings-btn" id="settingsBtn" title="Quality Settings">
                            <!-- Settings Icon -->
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>

                        <!-- Settings Dropdown -->
                        <div class="dropdown dropdown-right" id="settingsDropdown">
                            <div class="dropdown-header">Quality Preference</div>
                            
                            <button class="dropdown-item selected" onclick="selectQuality('Best Quality')">
                                <span>Best Quality</span>
                                <svg class="check-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                            </button>
                            <button class="dropdown-item" onclick="selectQuality('1080p')">
                                <span>1080p</span>
                                <svg class="check-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                            </button>
                            <button class="dropdown-item" onclick="selectQuality('720p')">
                                <span>720p</span>
                                <svg class="check-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                            </button>
                            <button class="dropdown-item" onclick="selectQuality('480p')">
                                <span>480p</span>
                                <svg class="check-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                            </button>

                            <div class="dropdown-divider"></div>
                            <div class="dropdown-footer">
                                Current: <span id="currentSummary">MP4 • Best Quality</span>
                            </div>
                        </div>
                    </div>

                    <div class="divider"></div>

                    <!-- Download Button -->
                    <button class="download-btn" title="Download">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M5 12h14"/>
                            <path d="m12 5 7 7-7 7"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <footer>
        </footer>
    </main>
</body>
</html>
