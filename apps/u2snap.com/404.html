<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>404 - Page Not Found | U2Snap</title>
    <meta name="description" content="The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.">

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">

    <link rel="preload" href="/fonts/Fredoka_SemiCondensed-Bold.woff2?v=2" as="font" type="font/woff2" crossorigin>
    <style>
        @font-face {
            font-family: 'Fredoka SemiCondensed';
            src: url('/fonts/Fredoka_SemiCondensed-Bold.woff2?v=2') format('woff2');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }
    </style>

    <!-- Theme Toggle Init -->
    <script>
        (function () {
            try {
                var theme = localStorage.getItem('theme');
                if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                } else {
                    document.documentElement.setAttribute('data-theme', 'light');
                }
            } catch (e) { }
        })();
        window.setTheme = function (theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        };
    </script>

    <link rel="stylesheet" href="/src/styles/404.css">
</head>

<body>
    <!-- HEADER -->
    <header class="site-header">
        <div class="container">
            <div class="header-inner">
                <a href="/" class="header-logo" aria-label="U2Snap home">
                    <span class="header-logo-text">U2Snap</span>
                </a>
                <nav class="header-nav" aria-label="Primary">
                    <a href="/" class="header-link">Home</a>

                    <button type="button" class="theme-toggle-btn" aria-label="Toggle theme"
                        onclick="setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark')">
                        <svg class="theme-toggle-icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" aria-hidden="true" focusable="false">
                            <circle cx="12" cy="12" r="4"></circle>
                            <path d="M12 2v2"></path>
                            <path d="M12 20v2"></path>
                            <path d="M4.93 4.93l1.41 1.41"></path>
                            <path d="M17.66 17.66l1.41 1.41"></path>
                            <path d="M2 12h2"></path>
                            <path d="M20 12h2"></path>
                            <path d="M6.34 17.66l-1.41 1.41"></path>
                            <path d="M19.07 4.93l-1.41 1.41"></path>
                        </svg>
                        <svg class="theme-toggle-icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" aria-hidden="true" focusable="false">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3c0 0 0 0 0 0a7 7 0 0 0 9.79 9.79z"></path>
                        </svg>
                    </button>
                </nav>
                <button id="mobile-menu-btn" class="mobile-menu-btn" type="button" aria-label="Open menu">
                    <span class="mobile-menu-bars" aria-hidden="true"></span>
                </button>
            </div>
        </div>
    </header>

    <!-- MOBILE DRAWER -->
    <div id="mobile-drawer" class="mobile-drawer" hidden>
        <div id="mobile-drawer-content" class="drawer-content" role="dialog" aria-modal="true" aria-label="Mobile menu">
            <div class="drawer-header">
                <a href="/" class="drawer-logo" aria-label="U2Snap home">
                    <svg class="drawer-logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 37 28" aria-hidden="true">
                        <rect width="37" height="28" rx="8" fill="#C65D3B"/>
                        <rect x="16.25" y="0" width="4.5" height="20" fill="white" />
                        <path d="M10.5 13L18.5 21L26.5 13" fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <span class="drawer-logo-text">U2Snap</span>
                </a>
                <button id="close-drawer-btn" class="drawer-close" type="button" aria-label="Close menu">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="drawer-scroll">
                <nav class="drawer-nav" aria-label="Mobile">
                    <a href="/" class="drawer-link">Home</a>

                    <button type="button" class="theme-toggle-btn" aria-label="Toggle theme"
                        onclick="setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark')">
                        <svg class="theme-toggle-icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" aria-hidden="true" focusable="false">
                            <circle cx="12" cy="12" r="4"></circle>
                            <path d="M12 2v2"></path>
                            <path d="M12 20v2"></path>
                            <path d="M4.93 4.93l1.41 1.41"></path>
                            <path d="M17.66 17.66l1.41 1.41"></path>
                            <path d="M2 12h2"></path>
                            <path d="M20 12h2"></path>
                            <path d="M6.34 17.66l-1.41 1.41"></path>
                            <path d="M19.07 4.93l-1.41 1.41"></path>
                        </svg>
                        <svg class="theme-toggle-icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" aria-hidden="true" focusable="false">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3c0 0 0 0 0 0a7 7 0 0 0 9.79 9.79z"></path>
                        </svg>
                    </button>
                </nav>
            </div>
        </div>
    </div>

    <main class="main-content">
        <div class="error-image-container">
            <img src="/404.jpg" alt="Page Not Found" class="error-image">
            <a href="/" class="error-home-btn">Go to Home Page</a>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="copyright">&copy; 2026 U2Snap. All rights reserved.</div>
        </div>
    </footer>

    <script type="module" src="/src/main.ts"></script>
</body>

</html>
