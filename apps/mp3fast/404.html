<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow">

    <!-- SEO Metadata -->
    <title>404 - Page Not Found | MP3Fast</title>
    <meta name="description" content="The page you are looking for might have been removed, had its name changed, or is temporarily unavailable." />

    <!-- Fonts -->
    <link rel="stylesheet" href="/assest/fonts/fonts.css">

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/favicon.png" type="image/png">
    <link type="image/png" sizes="16x16" rel="icon" href="/favicon1616.png">
    <link type="image/png" sizes="32x32" rel="icon" href="/favicon3232.png">
    <link type="image/png" sizes="48x48" rel="icon" href="/favicon4848.png">
    <link type="image/png" sizes="96x96" rel="icon" href="/favicon9696.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

    <!-- Theme Color -->
    <meta name="theme-color" content="#c10841">

    <!-- TypeScript Module -->
    <script type="module" src="/src/main.ts"></script>
</head>
<body>
    <!-- HEADER -->
    <div class="header-wrapper">
        <div id="header" class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <a href="/faq/" class="nav-link">FAQ</a>
        </div>
        <a href="/" class="logo-container">
            <img src="/logo.svg" alt="MP3Fast Logo" class="logo-img" />
            <div class="logo-text">MP3Fast</div>
        </a>
    </div>

    <!-- MAIN CONTENT -->
    <main class="error-page">
        <div class="error-content">
            <h1>404</h1>
            <p>Page Not Found</p>
            <a href="/" class="btn-home">Go to Homepage</a>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-content">
            <p class="footer-text">© 2025 MP3Fast.net | Free YouTube to MP3 Converter</p>
            <div class="footer-links">
                <a href="/contact/" class="footer-link">Contact</a>
                <a href="/copyright-claims/" class="footer-link">Copyright Claims</a>
                <a href="/privacy-policy/" class="footer-link">Privacy Policy</a>
                <a href="/terms-of-use/" class="footer-link">Terms of Use</a>
            </div>
        </div>
    </footer>

    <style>
        .error-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 200px);
            padding: 40px 20px;
            text-align: center;
        }
        .error-content h1 {
            font-size: 120px;
            font-weight: 700;
            color: #000;
            margin: 0;
            line-height: 1;
        }
        .error-content p {
            font-size: 24px;
            color: #666;
            margin: 16px 0 32px;
        }
        .btn-home {
            display: inline-block;
            padding: 14px 32px;
            background: #c10841;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-home:hover {
            background: #a00636;
        }
        @media (max-width: 480px) {
            .error-content h1 {
                font-size: 80px;
            }
            .error-content p {
                font-size: 18px;
            }
        }
        .footer {
            background: #000;
        }
        .footer-text,
        .footer-link {
            color: #fff;
        }
    </style>
</body>
</html>
