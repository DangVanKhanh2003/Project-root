<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Progress Bar Modal</title>
    <style>
        /* CSS cho body để demo dễ nhìn hơn */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f9;
        }

        /* --- BẮT ĐẦU STYLE CHO MODAL --- */

        /* Lớp phủ nền mờ toàn màn hình */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6); /* Nền đen mờ */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 15px;
            box-sizing: border-box;
        }

        /* Khung chứa nội dung của modal */
        .modal-container {
            background-color: #ffffff;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .modal-header h3 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 20px;
            color: #333;
        }

        .modal-content p {
            margin-top: 0;
            margin-bottom: 24px;
            color: #666;
            font-size: 16px;
        }


        /* --- BẮT ĐẦU STYLE CHO THANH TIẾN TRÌNH --- */

        .progress-bar-component {
            width: 100%;
        }

        /* Lớp vỏ ngoài của thanh tiến trình */
        .progress-bar-wrapper {
            width: 100%;
            background-color: #e9ecef; /* Màu nền của thanh */
            border-radius: 8px;
            overflow: hidden; /* Đảm bảo phần fill không tràn ra ngoài */
        }

        /* Lớp fill màu xanh thể hiện tiến trình */
        .progress-bar-fill {
            height: 24px;
            background-color: #007bff; /* Màu xanh dương thể hiện tiến trình */
            color: #ffffff;
            font-weight: bold;
            font-size: 14px;
            line-height: 24px; /* Căn giữa text theo chiều dọc */
            text-align: center;
            border-radius: 8px 0 0 8px; /* Bo góc bên trái */
            transition: width 0.4s ease; /* Hiệu ứng khi thay đổi % */
            white-space: nowrap;
        }

        /* Text trạng thái nằm dưới thanh tiến trình */
        .progress-bar-text {
            margin-top: 10px;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>

    <!-- MODAL HIỂN THỊ TIẾN TRÌNH -->
    <div class="modal-overlay">
        <div class="modal-container">
            
            <!-- Phần tiêu đề của modal -->
            <div class="modal-header">
                <h3>Converting your file...</h3>
            </div>

            <!-- Phần nội dung của modal -->
            <div class="modal-content">
                <p>Please wait, this may take a moment.</p>
                
                <!-- Component Thanh tiến trình (Progress Bar) -->
                <div class="progress-bar-component">
                    <!-- Thanh tiến trình -->
                    <div class="progress-bar-wrapper">
                        <div class="progress-bar-fill" style="width: 45%;">
                            45%
                        </div>
                    </div>
                    <!-- Text trạng thái bên dưới thanh tiến trình -->
                    <div class="progress-bar-text">
                        Now processing: video_chunk_03.mp4
                    </div>
                </div>
                <!-- Kết thúc Component -->

            </div>
        </div>
    </div>

</body>
</html>
