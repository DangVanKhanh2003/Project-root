<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",

  }
}
</script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const Header = () => {
          return (
            <div className="header-wrapper">
              <div id="header" className="nav-links">
                <a href="/" className="nav-link">Home</a>
                <a href="/faq/" className="nav-link">FAQ</a>
                <a href="/changelog/" className="nav-link">Changelog</a>
              </div>
              <div className="logo-container">
                <img src="logo.png" alt="YTMP3 Logo" className="logo-img" />
              </div>
            </div>
          );
        };

        const Footer = () => {
          return (
            <footer className="footer">
              <div className="footer-content">
                <p className="footer-text">© 2025 YTMP3.gg | Free YouTube to MP3 Converter</p>
                <div className="footer-links">
                  {['Contact', 'Copyright Claims', 'Privacy Policy', 'Terms of Use'].map((link) => (
                    <a key={link} href="#" className="footer-link">{link}</a>
                  ))}
                </div>
              </div>
            </footer>
          );
        };

        const MainContent = () => {
          return (
            <div className="content-wrapper">
              <h2>YTMP3 - The best Youtube to MP3 Converter</h2>
              <p>
                ytmp3.gg converts YouTube to high-quality audio in MP3, WAV, OGG, and Opus — plus stunning 4K, 2K, and 1080p video — in a simple, ad-free way.
              </p>
              <p>
                Convert any YouTube video to MP3 or MP4 in seconds with YTMP3.gg - the fast, ad-free, and secure way
                to download YouTube content. Just paste your link, choose the format and quality, and let YTMP3 do
                the work. No pop-ups, no registration, no distractions - simply smooth conversions that finish
                before you can blink.
              </p>

              <h3>How to Convert YouTube to MP3 or MP4</h3>
              <p>
                Using YTMP3 is simple: Copy your YouTube link, paste it into the field above, pick either MP3 for
                audio or MP4 for video, select your preferred quality, and click Convert. Most downloads are ready
                within a few seconds, depending on video length and resolution.
              </p>

              <h3>Why People Choose YTMP3</h3>
              <p>
                Free, ad‑free, and fast. Download unlimited YouTube videos and audio without sign‑ups or pop‑ups. The interface is clean and focused, the 3‑step flow is simple, and files are ready to play on any device. Paste a link, choose quality, and you’re done-on phone or desktop.
              </p>

              <h3>Supported Formats and Quality</h3>
              <ul>
                <li><strong>Audio:</strong> MP3 (128kbps, 192 kbps, 320kbps), OPUS, OGG, and WAV for lossless or high-clarity sound.</li>
                <li><strong>Video:</strong> MP4 at 144p, 240p, 360p, 480p, 720p HD, 1080p Full HD, and 2160p 4K.</li>
                <li><strong>Light mode:</strong> Optional 144p / 3GP video available in some regions like India for ultra-fast downloads.</li>
              </ul>

              <h3>Frequently Asked Questions</h3>
              <div>
                <div>
                  <h3>Is YTMP3 free to use?</h3>
                  <p>Yes - YTMP3 is completely free to use. You can convert and download unlimited YouTube videos in MP3 or MP4 formats-free and ad‑free.</p>
                </div>
                <div>
                  <h3>Can I use YTMP3 on my phone or tablet?</h3>
                  <p>Absolutely. YTMP3 is mobile-friendly and works perfectly on iPhone, Android, iPad, or any modern device with a browser.</p>
                </div>
                <div>
                  <h3>Do I need to install any software?</h3>
                  <p>Not at all. YTMP3 runs entirely in your browser-free, ad‑free, and fast-no extensions or installation required.</p>
                </div>
              </div>
              
              <div className="final-thoughts">
                <h3>Final Thoughts</h3>
                <p>
                  YTMP3.gg isn’t just another YouTube converter - it’s a refined, secure, and ad‑free platform built
                  for people who value quality and simplicity. Convert YouTube to MP3 or MP4 in seconds, enjoy your
                  content anywhere, and stay safe while doing it.
                </p>
              </div>
            </div>
          );
        };

        const DownloadForm = () => {
          const [url, setUrl] = useState('');
          const [format, setFormat] = useState('mp4');
          const [error, setError] = useState('');
          const [isConverting, setIsConverting] = useState(false);
          const inputRef = useRef(null);

          const handleInputChange = (e) => {
            setUrl(e.target.value);
            if (error) setError('');
          };

          const handleActionClick = async () => {
            setError('');
            if (url) {
              setUrl('');
              inputRef.current?.focus();
            } else {
              try {
                const text = await navigator.clipboard.readText();
                if (text) {
                  setUrl(text.trim());
                }
              } catch (err) {
                setError('Clipboard access not available. Please paste manually (Ctrl/Cmd + V).');
              }
            }
          };

          const handleSubmit = (e) => {
            e.preventDefault();
            if (!url.trim()) {
              setError('Please paste a URL or type keywords.');
              inputRef.current?.focus();
              return;
            }
            setIsConverting(true);
            setTimeout(() => {
              setIsConverting(false);
            }, 1500);
          };

          return (
            <div className="form-container">
              <h1 className="form-title">YTMP3 – YouTube to MP3</h1>

              <form onSubmit={handleSubmit} autoComplete="off" className="converter-form">
                <input type="submit" className="invisible-input" tabIndex={-1} />

                <div className="input-group">
                  <input
                    ref={inputRef}
                    type="text"
                    value={url}
                    onChange={handleInputChange}
                    className="url-input"
                    placeholder="Paste URL or search keywords"
                    required
                    autoCapitalize="off"
                    autoCorrect="off"
                    spellCheck="false"
                  />
                  <button
                    type="button"
                    onClick={handleActionClick}
                    className="action-btn"
                    aria-label={url ? "Clear input" : "Paste from clipboard"}
                  >
                    {url ? (
                      <svg xmlns="http://www.w3.org/2000/svg" className="icon-sm" viewBox="0 0 16 16">
                        <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0M5.354 4.646a.5.5 0 1 0-.708.708L7.293 8l-2.647 2.646a.5.5 0 0 0 .708.708L8 8.707l2.647 2.647a.5.5 0 0 0 .708-.708L8.707 8l2.647-2.646a.5.5 0 0 0-.708-.708L8 7.293z"/>
                      </svg>
                    ) : (
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" className="icon-sm">
                        <path d="M128 64C92.7 64 64 92.7 64 128L64 448C64 483.3 92.7 512 128 512L240 512L240 288C240 226.1 290.1 176 352 176L416 176L416 128C416 92.7 387.3 64 352 64L128 64zM312 176L168 176C154.7 176 144 165.3 144 152C144 138.7 154.7 128 168 128L312 128C325.3 128 336 138.7 336 152C336 165.3 325.3 176 312 176zM352 224C316.7 224 288 252.7 288 288L288 512C288 547.3 316.7 576 352 576L512 576C547.3 576 576 547.3 576 512L576 346.5C576 329.5 569.3 313.2 557.3 301.2L498.8 242.7C486.8 230.7 470.5 224 453.5 224L352 224z"/>
                      </svg>
                    )}
                  </button>
                </div>

                <div className="controls-row">
                  <div className="quality-select-wrapper">
                    <select
                      className={format === 'mp3' ? 'opacity-60' : ''}
                      disabled={format === 'mp3'}
                      defaultValue="720"
                    >
                       <option value="1080">MP4 - 1080p</option>
                       <option value="720">MP4 - 720p</option>
                       <option value="480">MP4 - 480p</option>
                       <option value="360">MP4 - 360p</option>
                       <option value="240">MP4 - 240p</option>
                       <option value="144">MP4 - 144p</option>
                    </select>
                  </div>

                  <div className="format-toggle">
                    <button
                      type="button"
                      onClick={() => setFormat('mp3')}
                      className={`toggle-btn ${format === 'mp3' ? 'active' : 'inactive'}`}
                    >
                      MP3
                    </button>
                    <button
                      type="button"
                      onClick={() => setFormat('mp4')}
                      className={`toggle-btn ${format === 'mp4' ? 'active' : 'inactive'}`}
                    >
                      MP4
                    </button>
                  </div>

                  <button
                    type="submit"
                    disabled={isConverting}
                    className="submit-btn"
                  >
                    {isConverting ? (
                      <span style={{display: 'flex', alignItems: 'center'}}>
                        <svg className="spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                          <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                          <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Converting...
                      </span>
                    ) : (
                      'Convert'
                    )}
                  </button>
                </div>
              </form>

              {error && (
                <div className="error-msg">
                  {error}
                </div>
              )}
            </div>
          );
        };

        const App = () => {
          return (
            <>
              <Header />
              <main style={{flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', width: '100%'}}>

                <section className="content-section">

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
