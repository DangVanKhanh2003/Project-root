<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TikTok Multi-Link Downloader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f3f4f6;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --blue: #2563eb;
      --blue-hover: #1d4ed8;
      --red: #dc2626;
      --red-light: #fef2f2;
      --red-text: #b91c1c;
      --radius: 12px;
      --radius-sm: 8px;
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --blue: #3b82f6;
      --blue-hover: #60a5fa;
      --red-light: #3f0f0f;
      --red-text: #fca5a5;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
      padding-bottom: 60px;
      transition: background .2s, color .2s;
    }

    /* ── Header ── */
    .header {
      position: sticky; top: 0; z-index: 50;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex; align-items: center; justify-content: space-between;
      transition: background .2s, border-color .2s;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-logo {
      width: 30px; height: 30px;
      background: var(--blue);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 11px; color: #fff;
      flex-shrink: 0; letter-spacing: .5px;
    }
    .header-title { font-weight: 700; font-size: 16px; }

    .theme-toggle {
      width: 34px; height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      transition: color .15s, border-color .15s;
      flex-shrink: 0;
    }
    .theme-toggle:hover { color: var(--text); border-color: var(--muted); }
    .theme-toggle svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; }
    .icon-sun  { display: none; }
    .icon-moon { display: block; }
    [data-theme="dark"] .icon-sun  { display: block; }
    [data-theme="dark"] .icon-moon { display: none; }

    /* ── Main ── */
    .main { max-width: 1280px; margin: 0 auto; padding: 20px; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      margin-bottom: 16px;
      transition: background .2s, border-color .2s;
    }
    .toolbar-left { display: flex; align-items: center; gap: 10px; }
    .toolbar-count { font-size: 13px; color: var(--muted); }
    .toolbar-count strong { color: var(--blue); font-weight: 700; }
    .divider-v { width: 1px; height: 14px; background: var(--border); }

    /* ── Check button ── */
    .check-btn {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .15s, border-color .15s;
    }
    .check-btn.checked, .check-btn.indeterminate { background: var(--blue); border-color: var(--blue); }
    .check-btn > svg { display: none; width: 10px; height: 10px; stroke: #fff; stroke-width: 2.5; fill: none; }
    .check-btn.checked > svg { display: block; }
    .dash { display: none; width: 7px; height: 1.5px; background: #fff; border-radius: 2px; }
    .check-btn.indeterminate .dash { display: block; }

    .check-label { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
    .check-label span { font-size: 13px; font-weight: 500; color: var(--muted); }
    .check-label:hover span { color: var(--text); }

    /* ── Download button ── */
    .btn-download {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: var(--radius-sm);
      border: none; cursor: pointer;
      font-size: 13px; font-weight: 500;
      transition: background .15s;
    }
    .btn-download.active { background: var(--blue); color: #fff; }
    .btn-download.active:hover { background: var(--blue-hover); }
    .btn-download.inactive { background: var(--border); color: var(--muted); cursor: not-allowed; pointer-events: none; }
    .btn-download svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }

    /* ── Group card ── */
    .group-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 14px;
      transition: background .2s, border-color .2s;
    }
    .group-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; gap: 10px;
    }
    .group-header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .group-info { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
    .group-author { font-weight: 600; font-size: 13px; }
    .group-link {
      display: flex; align-items: center; gap: 3px;
      font-size: 11px; color: var(--muted); text-decoration: none;
    }
    .group-link:hover { text-decoration: underline; color: var(--blue); }
    .group-link svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }
    .group-link-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; display: inline-block; }
    .group-header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .group-count { font-size: 12px; font-weight: 500; color: var(--muted); }

    .btn-remove-group {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: 6px;
      border: none; cursor: pointer;
      font-size: 12px; font-weight: 500;
      background: var(--red-light); color: var(--red-text);
      transition: opacity .15s;
    }
    .btn-remove-group:hover { opacity: .75; }
    .btn-remove-group svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ── Media grid ── */
    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 8px;
      padding: 12px 14px;
    }

    /* ── Media item ── */
    .media-item {
      position: relative;
      aspect-ratio: 4/5;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      background: var(--border);
    }
    .media-item img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    .item-check {
      position: absolute; top: 5px; left: 5px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: rgba(255,255,255,.85);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s;
      pointer-events: none;
    }
    .item-check svg { width: 9px; height: 9px; stroke: transparent; stroke-width: 3; fill: none; }
    .item-check.checked { background: var(--blue); }
    .item-check.checked svg { stroke: #fff; }

    .item-badge {
      position: absolute; top: 5px; right: 5px;
      background: rgba(0,0,0,.5);
      border-radius: 4px; padding: 2px 5px;
      display: flex; align-items: center; gap: 3px;
      pointer-events: none;
      font-size: 10px; font-weight: 500; color: #fff; line-height: 1;
    }
    .item-badge svg { width: 10px; height: 10px; stroke: #fff; fill: none; stroke-width: 2; flex-shrink: 0; }

    /* ── Empty ── */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty svg { width: 36px; height: 36px; stroke: var(--border); fill: none; stroke-width: 1.5; margin: 0 auto 10px; display: block; }
    .empty p { font-size: 14px; }

    @media (max-width: 480px) {
      .header-title { display: none; }
      .media-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 6px; }
      .group-link-text { max-width: 120px; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="header-logo">TK</div>
    <h1 class="header-title">Multi-Link Downloader</h1>
  </div>
  <button class="theme-toggle" id="themeBtn" aria-label="Toggle theme">
    <svg class="icon-sun" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <svg class="icon-moon" viewBox="0 0 24 24">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>
</header>

<main class="main" id="app"></main>

<script>
  const Icons = {
    check:    `<svg viewBox="0 0 24 24"><polyline points="20 6 9 18 4 13"/></svg>`,
    link:     `<svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>`,
    trash:    `<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`,
    download: `<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
    video:    `<svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>`,
    image:    `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`,
    inbox:    `<svg viewBox="0 0 24 24"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>`,
  };

  function makeMock() {
    return Array.from({ length: 5 }, (_, g) => ({
      id: 'g' + g,
      url: `https://tiktok.com/@creator_${g}/video/10000${g}`,
      author: `@creator_${g}`,
      items: Array.from({ length: Math.floor(Math.random() * 8) + 5 }, (_, i) => ({
        id: `g${g}i${i}`,
        type: Math.random() > 0.7 ? 'video' : 'image',
        thumb: `https://picsum.photos/seed/${g}${i}7/400/500`,
        selected: false,
      })),
    }));
  }

  let groups = makeMock();
  const allItems = () => groups.flatMap(g => g.items);
  const selCount = () => allItems().filter(i => i.selected).length;

  function toggleItem(gid, iid) {
    groups = groups.map(g => g.id !== gid ? g : {
      ...g, items: g.items.map(i => i.id === iid ? { ...i, selected: !i.selected } : i)
    });
    render();
  }

  function toggleGroup(gid) {
    groups = groups.map(g => {
      if (g.id !== gid) return g;
      const all = g.items.every(i => i.selected);
      return { ...g, items: g.items.map(i => ({ ...i, selected: !all })) };
    });
    render();
  }

  function toggleAll() {
    const all = groups.every(g => g.items.every(i => i.selected));
    groups = groups.map(g => ({ ...g, items: g.items.map(i => ({ ...i, selected: !all })) }));
    render();
  }

  function removeGroup(gid) {
    groups = groups.filter(g => g.id !== gid);
    render();
  }

  function download() {
    const n = selCount();
    if (!n) return;
    alert(`Downloading ${n} selected item${n !== 1 ? 's' : ''}...`);
  }

  function cc(sel, indet) {
    return sel ? 'checked' : indet ? 'indeterminate' : '';
  }

  function renderItem(gid, item) {
    return `
      <div class="media-item" data-action="toggle-item" data-gid="${gid}" data-iid="${item.id}">
        <img src="${item.thumb}" alt="" loading="lazy" referrerpolicy="no-referrer" />
        <div class="item-check${item.selected ? ' checked' : ''}">${Icons.check}</div>
        <div class="item-badge">${item.type === 'video' ? Icons.video : Icons.image}<span>${item.type === 'video' ? 'Video' : 'Image'}</span></div>
      </div>`;
  }

  function renderGroup(g) {
    const sel = g.items.filter(i => i.selected).length;
    const total = g.items.length;
    const all = sel === total && total > 0;
    const indet = sel > 0 && !all;
    const shortUrl = g.url.replace('https://', '');

    return `
      <div class="group-card">
        <div class="group-header">
          <div class="group-header-left">
            <button class="check-btn ${cc(all, indet)}" data-action="toggle-group" data-gid="${g.id}" aria-label="Select group">
              ${Icons.check}<span class="dash"></span>
            </button>
            <div class="group-info">
              <span class="group-author">${g.author}</span>
              <a href="${g.url}" target="_blank" rel="noreferrer" class="group-link" onclick="event.stopPropagation()">
                ${Icons.link}<span class="group-link-text">${shortUrl}</span>
              </a>
            </div>
          </div>
          <div class="group-header-right">
            <span class="group-count">${sel} / ${total}</span>
            <button class="btn-remove-group" data-action="remove-group" data-gid="${g.id}">
              ${Icons.trash}<span>Remove</span>
            </button>
          </div>
        </div>
        <div class="media-grid">
          ${g.items.map(i => renderItem(g.id, i)).join('')}
        </div>
      </div>`;
  }

  function renderToolbar() {
    if (!groups.length) return '';
    const total = allItems().length;
    const sel = selCount();
    const all = sel === total && total > 0;
    const indet = sel > 0 && !all;

    return `
      <div class="toolbar">
        <div class="toolbar-left">
          <label class="check-label">
            <button class="check-btn ${cc(all, indet)}" data-action="toggle-all" aria-label="Select all">
              ${Icons.check}<span class="dash"></span>
            </button>
            <span>Select all</span>
          </label>
          <div class="divider-v"></div>
          <span class="toolbar-count"><strong>${sel}</strong> / ${total} selected</span>
        </div>
        <button class="btn-download ${sel > 0 ? 'active' : 'inactive'}" data-action="download">
          ${Icons.download}<span>Download</span>
        </button>
      </div>`;
  }

  function render() {
    document.getElementById('app').innerHTML = groups.length
      ? renderToolbar() + groups.map(renderGroup).join('')
      : `<div class="empty">${Icons.inbox}<p>No content yet. Add TikTok links to get started.</p></div>`;
  }

  document.addEventListener('click', e => {
    const t = e.target.closest('[data-action]');
    if (!t) return;
    e.preventDefault();
    e.stopPropagation();
    const { action, gid, iid } = t.dataset;
    if      (action === 'toggle-item')  toggleItem(gid, iid);
    else if (action === 'toggle-group') toggleGroup(gid);
    else if (action === 'toggle-all')   toggleAll();
    else if (action === 'remove-group') removeGroup(gid);
    else if (action === 'download')     download();
  });

  document.getElementById('themeBtn').addEventListener('click', () => {
    const html = document.documentElement;
    html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
  });

  render();
</script>
</body>
</html>
