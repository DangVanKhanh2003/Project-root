name: Deploy App (Reusable)

on:
  workflow_call:
    inputs:
      app_name:
        description: 'App identifier (e.g., y2matepro)'
        required: true
        type: string
      app_directory:
        description: 'App directory relative to repo root (e.g., apps/y2matepro)'
        required: true
        type: string
      filter_path:
        description: 'pnpm filter path (e.g., ./apps/y2matepro)'
        required: true
        type: string
      domain:
        description: 'Domain/project name for server path'
        required: true
        type: string
      deploy_root:
        description: 'Server root directory for deploy (e.g. /var/www/KhanhHAUI/CICD/run)'
        default: '/var/www/KhanhHAUI/CICD/run'
        type: string
      build_command:
        description: 'Build script name for production'
        default: 'build'
        type: string
      build_test_command:
        description: 'Build script name for test environment'
        default: 'build:test'
        type: string
      dist_path:
        description: 'Build output directory'
        default: 'dist'
        type: string
      ssh_port:
        description: 'SSH port on deploy server'
        default: '22'
        type: string
    secrets:
      SSH_HOST:
        required: true
      SSH_USERNAME:
        required: true
      SSH_PRIVATE_KEY:
        required: true

env:
  PROJECT_NAME: ${{ github.ref_name == 'test-production' && format('{0}-test', inputs.domain) || inputs.domain }}
  PROJECT_ROOT: ${{ inputs.deploy_root }}
  RUN_DIR: ${{ format('{0}/{1}', inputs.deploy_root, github.ref_name == 'test-production' && format('{0}-test', inputs.domain) || inputs.domain) }}
  DEPLOY_USER: ${{ secrets.SSH_USERNAME }}
  DEPLOY_GROUP: nginx

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: DEBUG — show ssh_port value
        run: |
          echo "inputs.ssh_port = [${{ inputs.ssh_port }}]"
          echo "app_name        = [${{ inputs.app_name }}]"
          echo "ref_name        = [${{ github.ref_name }}]"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # cache: 'pnpm'  # Temporarily disabled due to cache corruption

      - name: Install dependencies (with retry)
        run: |
          set -euo pipefail
          MAX_RETRIES=2
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "📦 pnpm install (attempt $attempt/$MAX_RETRIES)..."
            if pnpm install --frozen-lockfile; then
              echo "✅ Install successful"
              break
            fi
            if [ "$attempt" -eq "$MAX_RETRIES" ]; then
              echo "❌ Install failed after $MAX_RETRIES attempts"
              exit 1
            fi
            echo "⚠️ Attempt $attempt failed, retrying in 10s..."
            sleep 10
          done

      - name: Verify Vite exists
        working-directory: ./${{ inputs.app_directory }}
        run: npx vite --version

      - name: Build (with retry)
        env:
          NODE_ENV: ${{ github.ref_name == 'test-production' && 'test' || 'production' }}
        run: |
          set -euo pipefail
          MAX_RETRIES=2
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "🏗️ Build ${{ inputs.app_name }} (attempt $attempt/$MAX_RETRIES)..."
            if [[ "${{ github.ref_name }}" == "test-production" ]]; then
              BUILD_OK=true
              pnpm --filter "${{ inputs.filter_path }}" run ${{ inputs.build_test_command }} || BUILD_OK=false
            else
              BUILD_OK=true
              pnpm --filter "${{ inputs.filter_path }}" run ${{ inputs.build_command }} || BUILD_OK=false
            fi
            if [ "$BUILD_OK" = true ] && [ -d "${{ inputs.app_directory }}/${{ inputs.dist_path }}" ]; then
              echo "✅ Build successful"
              break
            fi
            if [ "$attempt" -eq "$MAX_RETRIES" ]; then
              echo "❌ Build failed after $MAX_RETRIES attempts"
              exit 1
            fi
            echo "⚠️ Attempt $attempt failed, retrying in 10s..."
            sleep 10
          done

      - name: Replace robots.txt for test environment
        if: github.ref_name == 'test-production'
        run: |
          echo "User-agent: *" > ${{ inputs.app_directory }}/${{ inputs.dist_path }}/robots.txt
          echo "Disallow: /" >> ${{ inputs.app_directory }}/${{ inputs.dist_path }}/robots.txt
          echo "✅ Replaced robots.txt to block all crawlers for test environment"

      - name: Verify robots meta tags
        run: |
          set -euo pipefail
          DIST_DIR="${{ inputs.app_directory }}/${{ inputs.dist_path }}"
          echo "🔍 Verifying meta robots tags in HTML files..."
          find "$DIST_DIR" -name "*.html" -exec grep 'meta name="robots"' {} \; | head -5 || true

          if [[ "${{ github.ref_name }}" == "test-production" ]]; then
            echo "Expected: noindex for test environment"
            if grep -rE 'content="noindex' "$DIST_DIR" > /dev/null; then
              echo "✅ SUCCESS: Found noindex meta tags for test environment"
            else
              echo "❌ ERROR: noindex meta tags not found in test environment"
              exit 1
            fi
          else
            echo "Expected: index, follow for production"
            if grep -rE 'content="index' "$DIST_DIR" > /dev/null; then
              echo "✅ SUCCESS: Found index meta tags for production"
            else
              echo "⚠️  WARNING: index meta tags not found in production"
            fi
          fi

      - name: Archive dist (tar.gz)
        run: |
          set -euo pipefail
          tar -C ${{ inputs.app_directory }}/${{ inputs.dist_path }} -czf ${{ inputs.app_name }}-dist.tar.gz .

      # Upload bang native scp (KHONG dung appleboy/scp-action — loi voi ed25519 key)
      - name: Upload artifact to server
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ inputs.ssh_port }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          MAX_RETRIES=2
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "📤 SCP upload (attempt $attempt/$MAX_RETRIES)..."
            if scp -P ${{ inputs.ssh_port }} -i ~/.ssh/deploy_key -o ConnectTimeout=30 \
              "${{ inputs.app_name }}-dist.tar.gz" \
              "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/tmp/${{ inputs.app_name }}-dist.tar.gz"; then
              echo "✅ Upload successful"
              break
            fi
            if [ "$attempt" -eq "$MAX_RETRIES" ]; then
              echo "❌ Upload failed after $MAX_RETRIES attempts"
              exit 1
            fi
            echo "⚠️ Attempt $attempt failed, retrying in 15s..."
            sleep 15
          done

      - name: Activate on server
        run: |
          set -euo pipefail
          MAX_RETRIES=2
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "🚀 SSH deploy (attempt $attempt/$MAX_RETRIES)..."
            if ssh -p ${{ inputs.ssh_port }} -i ~/.ssh/deploy_key -o ConnectTimeout=30 \
              "${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}" bash -s <<'DEPLOY_SCRIPT'
          set -euo pipefail

          PROJECT_NAME="${{ env.PROJECT_NAME }}"
          PROJECT_ROOT="${{ env.PROJECT_ROOT }}"
          RUN_DIR="${{ env.RUN_DIR }}"
          DEPLOY_USER="${{ env.DEPLOY_USER }}"
          DEPLOY_GROUP="${{ env.DEPLOY_GROUP }}"

          : "${PROJECT_ROOT:?}"; : "${RUN_DIR:?}"; : "${PROJECT_NAME:?}"
          : "${DEPLOY_USER:?}"; : "${DEPLOY_GROUP:?}"

          APP_TAR="/tmp/${{ inputs.app_name }}-dist.tar.gz"

          # Xoá thư mục rác trùng tên file tar (nếu có từ cấu hình cũ)
          if [ -d "$APP_TAR" ]; then
            echo "Found leftover dir $APP_TAR → removing"
            rm -rf "$APP_TAR"
          fi

          [ -f "$APP_TAR" ] || { echo "Artifact not found: $APP_TAR" >&2; exit 1; }

          # Chỉ cho phép deploy trong PROJECT_ROOT
          case "$RUN_DIR" in "$PROJECT_ROOT"/*) ;; *)
            echo "Unsafe RUN_DIR: $RUN_DIR" >&2; exit 1;;
          esac

          mkdir -p "$RUN_DIR" || {
            echo "❌ mkdir -p $RUN_DIR failed."; exit 1;
          }

          if ! ( : > "$RUN_DIR/.writetest" 2>/dev/null ); then
            echo "❌ $RUN_DIR không ghi được bởi $(whoami)."; exit 1
          fi
          rm -f "$RUN_DIR/.writetest" || true

          find "$RUN_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          tar -xzf "$APP_TAR" -C "$RUN_DIR"

          find "$RUN_DIR" -type d -exec chmod 755 {} +
          find "$RUN_DIR" -type f -exec chmod 644 {} +

          if id -nG "$USER" | grep -qw "$DEPLOY_GROUP"; then
            chgrp -R "$DEPLOY_GROUP" "$RUN_DIR" || true
          fi

          rm -f "$APP_TAR" || true
          echo "✅ Deployed $PROJECT_NAME successfully!"
          DEPLOY_SCRIPT
            then
              echo "✅ Deploy successful"
              break
            fi
            if [ "$attempt" -eq "$MAX_RETRIES" ]; then
              echo "❌ Deploy failed after $MAX_RETRIES attempts"
              exit 1
            fi
            echo "⚠️ Attempt $attempt failed, retrying in 15s..."
            sleep 15
          done

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
