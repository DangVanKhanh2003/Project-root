name: CI/CD Pipeline

on:
  push:
    branches: [main, test-production]
  workflow_dispatch:
    inputs:
      deploy_all:
        description: 'Deploy all apps regardless of changes'
        type: boolean
        default: false
      specific_app:
        description: 'Deploy specific app only (leave empty for auto-detect)'
        type: choice
        options:
          - ''
          - 'y2matepro'
          - 'y2matevc'
          - 'mp3fast'
          - 'ytmp3.my'
          - '4kvideopro'
          - 'ssvid.cc'
          - 'ezconv'
          - 'ytmp4.gg'
          - 'onedownloader.net'
          - 'u2snap.com'
          - 'convert1s.com'
          - 'snap1s.com'
          - 'y2save.com'
          - 'tube1s.com'
          - 'snakeloader.com'
          - 'ytsss.com'
          - 'sstube.net'
          - 'ytconvert.org'
          - 'yt1s.guru'
          - 'Ytbdownloader.com'
          - 'y2mate.com.vc'
          - 'real-y2mate.com'
          - 'ytmp3.website'
          - 'y2ss.net'

concurrency:
  group: ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # Job 1: Detect which apps have changes
  # ============================================
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      apps_to_deploy: ${{ steps.determine-apps.outputs.apps }}
      has_changes: ${{ steps.determine-apps.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes with dorny/paths-filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - 'packages/**'
              - 'modify-robots-meta.js'
              - 'pnpm-lock.yaml'
            y2matepro:
              - 'apps/y2matepro/**'
            y2matevc:
              - 'apps/y2matevc/**'
            mp3fast:
              - 'apps/mp3fast/**'
            ytmp3.my:
              - 'apps/ytmp3.my/**'
            4kvideopro:
              - 'apps/4kvideopro/**'
            ssvid.cc:
              - 'apps/ssvid.cc/**'
            ezconv:
              - 'apps/ezconv/**'
            ytmp4.gg:
              - 'apps/ytmp4.gg/**'
            onedownloader.net:
              - 'apps/onedownloader.net/**'
            u2snap.com:
              - 'apps/u2snap.com/**'
            convert1s.com:
              - 'apps/convert1s.com/**'
            snap1s.com:
              - 'apps/snap1s.com/**'
            y2save.com:
              - 'apps/y2save.com/**'
            tube1s.com:
              - 'apps/tube1s.com/**'
            snakeloader.com:
              - 'apps/snakeloader.com/**'
            ytsss.com:
              - 'apps/ytsss.com/**'
            sstube.net:
              - 'apps/sstube.net/**'
            ytconvert.org:
              - 'apps/ytconvert.org/**'
            yt1s.guru:
              - 'apps/yt1s.guru/**'
            Ytbdownloader.com:
              - 'apps/Ytbdownloader.com/**'
            y2mate.com.vc:
              - 'apps/y2mate.com.vc/**'
            real-y2mate.com:
              - 'apps/real-y2mate.com/**'
            ytmp3.website:
              - 'apps/ytmp3.website/**'
            y2ss.net:
              - 'apps/y2ss.net/**'

      - name: Determine apps to deploy
        id: determine-apps
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          ALL_APPS='["y2matepro","y2matevc","mp3fast","ytmp3.my","4kvideopro","ssvid.cc","ezconv","ytmp4.gg","onedownloader.net","u2snap.com","convert1s.com","snap1s.com","y2save.com","tube1s.com","snakeloader.com","ytsss.com","sstube.net","ytconvert.org","yt1s.guru","Ytbdownloader.com","y2mate.com.vc","real-y2mate.com","ytmp3.website","y2ss.net"]'

          # Handle manual trigger with specific_app
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ inputs.specific_app }}" ]]; then
              echo "📌 Manual deploy: ${{ inputs.specific_app }}"
              echo "apps=[\"${{ inputs.specific_app }}\"]" >> $GITHUB_OUTPUT
              echo "has_changes=true" >> $GITHUB_OUTPUT
              exit 0
            fi

            if [[ "${{ inputs.deploy_all }}" == "true" ]]; then
              echo "📌 Manual deploy: ALL apps"
              echo "apps=$ALL_APPS" >> $GITHUB_OUTPUT
              echo "has_changes=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # Handle commit message convention [deploy:app1,app2] or [deploy:all]
          if [[ "$COMMIT_MSG" =~ \[deploy:([^\]]+)\] ]]; then
            DEPLOY_TARGETS="${BASH_REMATCH[1]}"
            echo "📝 Found deploy tag in commit: $DEPLOY_TARGETS"

            if [[ "$DEPLOY_TARGETS" == "all" ]]; then
              echo "📌 Commit tag deploy: ALL apps"
              echo "apps=$ALL_APPS" >> $GITHUB_OUTPUT
              echo "has_changes=true" >> $GITHUB_OUTPUT
              exit 0
            fi

            # Parse comma-separated app names
            DEPLOY_APPS="[]"
            IFS=',' read -ra APPS <<< "$DEPLOY_TARGETS"
            for app in "${APPS[@]}"; do
              app=$(echo "$app" | xargs)  # trim whitespace
              if echo "$ALL_APPS" | jq -e --arg a "$app" 'index($a) != null' > /dev/null; then
                DEPLOY_APPS=$(echo $DEPLOY_APPS | jq -c --arg a "$app" '. + [$a]')
                echo "✅ Will deploy: $app"
              else
                echo "⚠️ Unknown app ignored: $app"
              fi
            done

            if [[ "$DEPLOY_APPS" != "[]" ]]; then
              echo "📌 Commit tag deploy: $DEPLOY_APPS"
              echo "apps=$DEPLOY_APPS" >> $GITHUB_OUTPUT
              echo "has_changes=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # If shared packages changed, deploy ALL apps
          if [[ "${{ steps.filter.outputs.shared }}" == "true" ]]; then
            echo "📦 Shared packages changed - deploying ALL apps"
            echo "apps=$ALL_APPS" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Build list of changed apps
          CHANGED_APPS="[]"

          if [[ "${{ steps.filter.outputs.y2matepro }}" == "true" ]]; then
            CHANGED_APPS=$(echo $CHANGED_APPS | jq -c '. + ["y2matepro"]')
            echo "✅ y2matepro changed"
          fi
          if [[ "${{ steps.filter.outputs.y2matevc }}" == "true" ]]; then
            CHANGED_APPS=$(echo $CHANGED_APPS | jq -c '. + ["y2matevc"]')
            echo "✅ y2matevc changed"
          fi
          if [[ "${{ steps.filter.outputs.mp3fast }}" == "true" ]]; then
            CHANGED_APPS=$(echo $CHANGED_APPS | jq -c '. + ["mp3fast"]')
            echo "✅ mp3fast changed"
          fi
          if [[ "${{ steps.filter.outputs.ytmp3.my }}" == "true" ]]; then
            CHANGED_APPS=$(echo $CHANGED_APPS | jq -c '. + ["ytmp3.my"]')
            echo "✅ ytmp3.my changed"
          fi
          if [[ "${{ steps.filter.outputs['4kvideopro'] }}" == "true" ]]; then
            CHANGED_APPS=$(echo $CHANGED_APPS | jq -c '. + ["4kvideopro"]')
            echo "✅ 4kvideopro changed"
          fi
          if [[ "${{ steps.filter.outputs['ssvid.cc'] }}" == "true" ]]; then
            CHANGED_APPS=$(echo $CHANGED_APPS | jq -c '. + ["ssvid.cc"]')
            echo "✅ ssvid.cc changed"
          fi
          if [[ "${{ steps.filter.outputs.ezconv }}" == "true" ]]; then
            CHANGED_APPS=$(echo $CHANGED_APPS | jq -c '. + ["ezconv"]')
            echo "✅ ezconv changed"
          fi
          if [[ "${{ steps.filter.outputs['ytmp4.gg'] }}" == "true" ]]; then
            CHANGED_APPS=$(echo $CHANGED_APPS | jq -c '. + ["ytmp4.gg"]')
            echo "✅ ytmp4.gg changed"
          fi
          if [[ "${{ steps.filter.outputs['onedownloader.net'] }}" == "true" ]]; then
            CHANGED_APPS=$(echo $CHANGED_APPS | jq -c '. + ["onedownloader.net"]')
            echo "✅ onedownloader.net changed"
          fi
          if [[ "${{ steps.filter.outputs['u2snap.com'] }}" == "true" ]]; then
            CHANGED_APPS=$(echo $CHANGED_APPS | jq -c '. + ["u2snap.com"]')
            echo "✅ u2snap.com changed"
          fi
          if [[ "${{ steps.filter.outputs['convert1s.com'] }}" == "true" ]]; then
            CHANGED_APPS=$(echo $CHANGED_APPS | jq -c '. + ["convert1s.com"]')
            echo "✅ convert1s.com changed"
          fi
          if [[ "${{ steps.filter.outputs['snap1s.com'] }}" == "true" ]]; then
            CHANGED_APPS=$(echo $CHANGED_APPS | jq -c '. + ["snap1s.com"]')
            echo "✅ snap1s.com changed"
          fi
          if [[ "${{ steps.filter.outputs['y2save.com'] }}" == "true" ]]; then
            CHANGED_APPS=$(echo $CHANGED_APPS | jq -c '. + ["y2save.com"]')
            echo "✅ y2save.com changed"
          fi
          if [[ "${{ steps.filter.outputs['tube1s.com'] }}" == "true" ]]; then
            CHANGED_APPS=$(echo $CHANGED_APPS | jq -c '. + ["tube1s.com"]')
            echo "✅ tube1s.com changed"
          fi
          if [[ "${{ steps.filter.outputs['snakeloader.com'] }}" == "true" ]]; then
            CHANGED_APPS=$(echo $CHANGED_APPS | jq -c '. + ["snakeloader.com"]')
            echo "✅ snakeloader.com changed"
          fi
          if [[ "${{ steps.filter.outputs['ytsss.com'] }}" == "true" ]]; then
            CHANGED_APPS=$(echo $CHANGED_APPS | jq -c '. + ["ytsss.com"]')
            echo "✅ ytsss.com changed"
          fi
          if [[ "${{ steps.filter.outputs['sstube.net'] }}" == "true" ]]; then
            CHANGED_APPS=$(echo $CHANGED_APPS | jq -c '. + ["sstube.net"]')
            echo "✅ sstube.net changed"
          fi
          if [[ "${{ steps.filter.outputs['ytconvert.org'] }}" == "true" ]]; then
            CHANGED_APPS=$(echo $CHANGED_APPS | jq -c '. + ["ytconvert.org"]')
            echo "✅ ytconvert.org changed"
          fi
          if [[ "${{ steps.filter.outputs['yt1s.guru'] }}" == "true" ]]; then
            CHANGED_APPS=$(echo $CHANGED_APPS | jq -c '. + ["yt1s.guru"]')
            echo "✅ yt1s.guru changed"
          fi
          if [[ "${{ steps.filter.outputs['Ytbdownloader.com'] }}" == "true" ]]; then
            CHANGED_APPS=$(echo $CHANGED_APPS | jq -c '. + ["Ytbdownloader.com"]')
            echo "✅ Ytbdownloader.com changed"
          fi
          if [[ "${{ steps.filter.outputs['y2mate.com.vc'] }}" == "true" ]]; then
            CHANGED_APPS=$(echo $CHANGED_APPS | jq -c '. + ["y2mate.com.vc"]')
            echo "✅ y2mate.com.vc changed"
          fi
          if [[ "${{ steps.filter.outputs['real-y2mate.com'] }}" == "true" ]]; then
            CHANGED_APPS=$(echo $CHANGED_APPS | jq -c '. + ["real-y2mate.com"]')
            echo "✅ real-y2mate.com changed"
          fi
          if [[ "${{ steps.filter.outputs['ytmp3.website'] }}" == "true" ]]; then
            CHANGED_APPS=$(echo $CHANGED_APPS | jq -c '. + ["ytmp3.website"]')
            echo "✅ ytmp3.website changed"
          fi
          if [[ "${{ steps.filter.outputs['y2ss.net'] }}" == "true" ]]; then
            CHANGED_APPS=$(echo $CHANGED_APPS | jq -c '. + ["y2ss.net"]')
            echo "✅ y2ss.net changed"
          fi

          echo "📋 Changed apps: $CHANGED_APPS"

          if [[ "$CHANGED_APPS" == "[]" ]]; then
            echo "⏭️ No app changes detected"
            echo "apps=[]" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "apps=$CHANGED_APPS" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

  # ============================================
  # Wave 1: Deploy apps (max 5 parallel per wave)
  # ============================================
  deploy-y2matepro:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' && contains(fromJson(needs.detect-changes.outputs.apps_to_deploy), 'y2matepro')
    uses: ./.github/workflows/deploy-app.yml
    with:
      app_name: y2matepro
      app_directory: apps/y2matepro
      filter_path: ./apps/y2matepro
      domain: ${{ vars.Y2MATEPRO_DOMAIN || 'y2matepro.com' }}
    secrets:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PORT: ${{ secrets.SSH_PORT }}

  deploy-y2matevc:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' && contains(fromJson(needs.detect-changes.outputs.apps_to_deploy), 'y2matevc')
    uses: ./.github/workflows/deploy-app.yml
    with:
      app_name: y2matevc
      app_directory: apps/y2matevc
      filter_path: ./apps/y2matevc
      domain: ${{ vars.Y2MATEVC_DOMAIN || 'y2mate.vc' }}
    secrets:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PORT: ${{ secrets.SSH_PORT }}

  deploy-mp3fast:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' && contains(fromJson(needs.detect-changes.outputs.apps_to_deploy), 'mp3fast')
    uses: ./.github/workflows/deploy-app.yml
    with:
      app_name: mp3fast
      app_directory: apps/mp3fast
      filter_path: ./apps/mp3fast
      domain: ${{ vars.MP3FAST_DOMAIN || 'mp3fast.net' }}
    secrets:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PORT: ${{ secrets.SSH_PORT }}

  deploy-ytmp3-my:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' && contains(fromJson(needs.detect-changes.outputs.apps_to_deploy), 'ytmp3.my')
    uses: ./.github/workflows/deploy-app.yml
    with:
      app_name: ytmp3.my
      app_directory: apps/ytmp3.my
      filter_path: ./apps/ytmp3.my
      domain: ${{ vars.YTMP3_MY_DOMAIN || 'ytmp3.my' }}
    secrets:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PORT: ${{ secrets.SSH_PORT }}

  deploy-4kvideopro:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' && contains(fromJson(needs.detect-changes.outputs.apps_to_deploy), '4kvideopro')
    uses: ./.github/workflows/deploy-app.yml
    with:
      app_name: 4kvideopro
      app_directory: apps/4kvideopro
      filter_path: ./apps/4kvideopro
      domain: ${{ vars.FOUR_K_VIDEO_PRO_DOMAIN || '4kvideo.pro' }}
    secrets:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PORT: ${{ secrets.SSH_PORT }}

  # ============================================
  # Wave 2: Waits for Wave 1 to finish
  # ============================================
  deploy-ssvid-cc:
    needs: [detect-changes, deploy-y2matepro, deploy-y2matevc, deploy-mp3fast, deploy-ytmp3-my, deploy-4kvideopro]
    if: ${{ !cancelled() && needs.detect-changes.outputs.has_changes == 'true' && contains(fromJson(needs.detect-changes.outputs.apps_to_deploy), 'ssvid.cc') }}
    uses: ./.github/workflows/deploy-app.yml
    with:
      app_name: ssvid.cc
      app_directory: apps/ssvid.cc
      filter_path: ./apps/ssvid.cc
      domain: ${{ vars.SSVID_DOMAIN || 'ssvid.cc' }}
    secrets:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PORT: ${{ secrets.SSH_PORT }}

  deploy-ezconv:
    needs: [detect-changes, deploy-y2matepro, deploy-y2matevc, deploy-mp3fast, deploy-ytmp3-my, deploy-4kvideopro]
    if: ${{ !cancelled() && needs.detect-changes.outputs.has_changes == 'true' && contains(fromJson(needs.detect-changes.outputs.apps_to_deploy), 'ezconv') }}
    uses: ./.github/workflows/deploy-app.yml
    with:
      app_name: ezconv
      app_directory: apps/ezconv
      filter_path: ./apps/ezconv
      domain: ${{ vars.EZCONV_DOMAIN || 'ezconv.pro' }}
    secrets:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PORT: ${{ secrets.SSH_PORT }}

  deploy-ytmp4-gg:
    needs: [detect-changes, deploy-y2matepro, deploy-y2matevc, deploy-mp3fast, deploy-ytmp3-my, deploy-4kvideopro]
    if: ${{ !cancelled() && needs.detect-changes.outputs.has_changes == 'true' && contains(fromJson(needs.detect-changes.outputs.apps_to_deploy), 'ytmp4.gg') }}
    uses: ./.github/workflows/deploy-app.yml
    with:
      app_name: ytmp4.gg
      app_directory: apps/ytmp4.gg
      filter_path: ./apps/ytmp4.gg
      domain: ${{ vars.YTMP4_DOMAIN || 'ytmp4.gg' }}
    secrets:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PORT: ${{ secrets.SSH_PORT }}

  deploy-onedownloader-net:
    needs: [detect-changes, deploy-y2matepro, deploy-y2matevc, deploy-mp3fast, deploy-ytmp3-my, deploy-4kvideopro]
    if: ${{ !cancelled() && needs.detect-changes.outputs.has_changes == 'true' && contains(fromJson(needs.detect-changes.outputs.apps_to_deploy), 'onedownloader.net') }}
    uses: ./.github/workflows/deploy-app.yml
    with:
      app_name: onedownloader.net
      app_directory: apps/onedownloader.net
      filter_path: ./apps/onedownloader.net
      domain: ${{ vars.ONEDOWNLOADER_DOMAIN || 'onedownloader.net' }}
    secrets:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PORT: ${{ secrets.SSH_PORT }}

  deploy-ytbdownloader-com:
    needs: [detect-changes, deploy-y2matepro, deploy-y2matevc, deploy-mp3fast, deploy-ytmp3-my, deploy-4kvideopro]
    if: ${{ !cancelled() && needs.detect-changes.outputs.has_changes == 'true' && contains(fromJson(needs.detect-changes.outputs.apps_to_deploy), 'Ytbdownloader.com') }}
    uses: ./.github/workflows/deploy-app.yml
    with:
      app_name: Ytbdownloader.com
      app_directory: apps/Ytbdownloader.com
      filter_path: ./apps/Ytbdownloader.com
      domain: ${{ vars.YTBDOWNLOADER_DOMAIN || 'ytbdownloader.com' }}
    secrets:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PORT: ${{ secrets.SSH_PORT }}

  deploy-u2snap-com:
    needs: [detect-changes, deploy-y2matepro, deploy-y2matevc, deploy-mp3fast, deploy-ytmp3-my, deploy-4kvideopro]
    if: ${{ !cancelled() && needs.detect-changes.outputs.has_changes == 'true' && contains(fromJson(needs.detect-changes.outputs.apps_to_deploy), 'u2snap.com') }}
    uses: ./.github/workflows/deploy-app.yml
    with:
      app_name: u2snap.com
      app_directory: apps/u2snap.com
      filter_path: ./apps/u2snap.com
      domain: ${{ vars.U2SNAP_DOMAIN || 'u2snap.com' }}
    secrets:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PORT: ${{ secrets.SSH_PORT }}

  # ============================================
  # Wave 3: Waits for Wave 2 to finish
  # ============================================
  deploy-convert1s-com:
    needs: [detect-changes, deploy-ssvid-cc, deploy-ezconv, deploy-ytmp4-gg, deploy-onedownloader-net, deploy-u2snap-com, deploy-ytbdownloader-com]
    if: ${{ !cancelled() && needs.detect-changes.outputs.has_changes == 'true' && contains(fromJson(needs.detect-changes.outputs.apps_to_deploy), 'convert1s.com') }}
    uses: ./.github/workflows/deploy-app.yml
    with:
      app_name: convert1s.com
      app_directory: apps/convert1s.com
      filter_path: ./apps/convert1s.com
      domain: ${{ vars.CONVERT1S_DOMAIN || 'convert1s.com' }}
    secrets:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PORT: ${{ secrets.SSH_PORT }}

  deploy-snap1s-com:
    needs: [detect-changes, deploy-ssvid-cc, deploy-ezconv, deploy-ytmp4-gg, deploy-onedownloader-net, deploy-u2snap-com, deploy-ytbdownloader-com]
    if: ${{ !cancelled() && needs.detect-changes.outputs.has_changes == 'true' && contains(fromJson(needs.detect-changes.outputs.apps_to_deploy), 'snap1s.com') }}
    uses: ./.github/workflows/deploy-app.yml
    with:
      app_name: snap1s.com
      app_directory: apps/snap1s.com
      filter_path: ./apps/snap1s.com
      domain: ${{ vars.SNAP1S_DOMAIN || 'snap1s.com' }}
    secrets:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PORT: ${{ secrets.SSH_PORT }}

  deploy-tube1s-com:
    needs: [detect-changes, deploy-ssvid-cc, deploy-ezconv, deploy-ytmp4-gg, deploy-onedownloader-net, deploy-u2snap-com, deploy-ytbdownloader-com]
    if: ${{ !cancelled() && needs.detect-changes.outputs.has_changes == 'true' && contains(fromJson(needs.detect-changes.outputs.apps_to_deploy), 'tube1s.com') }}
    uses: ./.github/workflows/deploy-app.yml
    with:
      app_name: tube1s.com
      app_directory: apps/tube1s.com
      filter_path: ./apps/tube1s.com
      domain: ${{ vars.TUBE1S_DOMAIN || 'tube1s.com' }}
    secrets:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PORT: ${{ secrets.SSH_PORT }}

  deploy-y2save-com:
    needs: [detect-changes, deploy-ssvid-cc, deploy-ezconv, deploy-ytmp4-gg, deploy-onedownloader-net, deploy-u2snap-com, deploy-ytbdownloader-com]
    if: ${{ !cancelled() && needs.detect-changes.outputs.has_changes == 'true' && contains(fromJson(needs.detect-changes.outputs.apps_to_deploy), 'y2save.com') }}
    uses: ./.github/workflows/deploy-app.yml
    with:
      app_name: y2save.com
      app_directory: apps/y2save.com
      filter_path: ./apps/y2save.com
      domain: ${{ vars.Y2SAVE_DOMAIN || 'y2save.com' }}
    secrets:
